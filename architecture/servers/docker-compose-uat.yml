# hand crafted with love

# version: "3.7"

x-eureka-env: &eureka-env
  EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
  EUREKA_INSTANCE_LEASE_RENEWAL_INTERVAL_IN_SECONDS: "30"
  EUREKA_INSTANCE_LEASE_EXPIRATION_DURATION_IN_SECONDS: "90"
  EUREKA_CLIENT_EUREKA_SERVER_CONNECT_TIMEOUT_SECONDS: "10"
  EUREKA_CLIENT_EUREKA_SERVER_READ_TIMEOUT_SECONDS: "30"

x-common-settings: &common-settings
  #extra_hosts:
  #- dev-gioficinaviertual.zurichseguros.com.ec:10.113.80.6
  #- serviciosias.zurichseguros.com.ec:10.119.106.16
  #- uat-oficinavirtual.zurichseguros.com.ec:10.113.84.8
  dns_search:
    - uat.arizona
  restart: always
  domainname: uat.arizona
  env_file: arizona.env
  #deploy:
  #    restart_policy:
  #        condition: on-failure
  #        delay: 5s
  #        max_attempts: 3
  #        window: 30s
  entrypoint: java
  environment:
    <<: *eureka-env
  #volumes:
  #- /etc/timezone:/etc/timezone:ro
  #- /etc/localtime:/etc/localtime:ro
  #- /opt/arizona/uat/m2:/m2:ro

services:

  ams-config-server_srv:
    <<: *common-settings
    hostname: ams-config-server
    image: zurcontainerreg.azurecr.io/ov-ams-config-server:${CONFIG_SERVER_VERSION}
    command: >
      -Dlogging.level.root=INFO
      -Djava.net.preferIPv4Stack=true
      -Djava.net.preferIPv4Addresses=true
      -Xmx256m
      -Djava.security.egd=file:/dev/./urandom
      -Darizona.db.vendor.select=${ARIZONA_DB_VENDOR_SELECT}
      -Dthin.root="/m2"
      -Dsun.reflect.inflationThreshold=2147483647
      -Dorg.apache.activemq.kahaDB.files.skipMetadataUpdate=true
      -jar /ams-config-server.jar
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      arizona:
        aliases:
          - ams-config-server.uat.arizona

  ams-eureka_srv:
    <<: *common-settings
    hostname: ams-eureka
    image: zurcontainerreg.azurecr.io/ov-ams-eureka:${EUREKA_VERSION}
    command: >
      -Dlogging.level.root=INFO
      -Djava.net.preferIPv4Stack=true
      -Djava.net.preferIPv4Addresses=true
      -Xmx384m
      -Djava.security.egd=file:/dev/./urandom
      -Darizona.db.vendor.select=${ARIZONA_DB_VENDOR_SELECT} -Dlogging.level.com.netflix.eureka.cluster.ReplicationTaskProcessor=OFF
      -Dthin.root="/m2"
      -Dsun.reflect.inflationThreshold=2147483647
      -Dorg.apache.activemq.kahaDB.files.skipMetadataUpdate=true
      -jar /ams-eureka.jar
    mem_limit: 768m
    mem_reservation: 384m
    cpus: "0.25"
    networks:
      arizona:
        aliases:
          - ams-eureka.uat.arizona
    depends_on:
      ams-config-server_srv:
        condition: service_healthy

  ams-eureka-slave_srv:
