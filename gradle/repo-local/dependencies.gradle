subprojects { subProject ->

    pluginManager.withPlugin("java") { plg ->
        apply plugin: 'io.spring.dependency-management'
        apply plugin: 'maven-publish'

        repositories {
            maven {
                url uri("$rootDir/.project/local-repo")
            }
            mavenLocal()
            mavenCentral()
            maven {
                name = "azureArtifacts"
                url = uri(project.findProperty("zurich-library-${env}FeedUrl") ?: "")
                credentials {
                    username = project.findProperty("zurich-library-${env}Username") ?: ""
                    password = project.findProperty("zurich-library-${env}Password") ?: ""
                }
            }
        }

        task install {
            dependsOn publishToMavenLocal
        }
        task uploadArchives {
            dependsOn publish
        }

        task sourcesJar(type: Jar) {
            classifier = 'sources'
            from sourceSets.main.allJava
        }

        publishing {
            publications {
                maven(MavenPublication) {
                    from components.java
                    artifact sourcesJar

                    versionMapping {
                        usage('java-api') {
                            fromResolutionOf('runtimeClasspath')
                        }
                        usage('java-runtime') {
                            fromResolutionResult()
                        }
                    }
                }
            }
            repositories {
                maven {
                    name = "azureArtifacts"
                    url = uri(project.findProperty("zurich-library-${env}FeedUrl") ?: "")
                    credentials {
                        username = project.findProperty("zurich-library-${env}Username") ?: ""
                        password = project.findProperty("zurich-library-${env}Password") ?: ""
                    }
                }
            }
        }

        dependencyManagement {
            imports {
                mavenBom("org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}")
                mavenBom("org.springframework.boot:spring-boot-dependencies:${springBootVersion}")
            }
            dependencies {
                dependency group: 'com.oracle.ojdbc', name: 'ojdbc8', version: '19.3.0.0'
            }
        }

        dependencies {
            implementation('com.fasterxml.jackson.core:jackson-databind:2.12.7.1')
            implementation('com.thoughtworks.xstream:xstream:1.4.20')
            implementation('com.google.guava:guava:32.0.1-jre')

            if (JavaVersion.current() != JavaVersion.VERSION_1_8) {
                implementation('javax.xml.bind:jaxb-api:2.3.1')
                implementation('com.sun.xml.bind:jaxb-core:3.0.2')
                implementation('com.sun.xml.bind:jaxb-impl:3.0.2')
                implementation('com.sun.xml.ws:jaxws-ri:2.3.3')
                implementation('javax.mail:javax.mail-api:1.6.2')
                implementation('javax.activation:activation:1.1.1')
            }
        }
    }
}
