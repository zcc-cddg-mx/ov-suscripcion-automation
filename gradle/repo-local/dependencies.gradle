repositories {
    maven {
        url uri("$rootDir/.project/local-repo")
    }
    mavenLocal()
    mavenCentral()
    maven {
        name = "azureArtifacts"
        url = uri(project.findProperty("zurich-library-${env}FeedUrl") ?: "")
        credentials {
            username = project.findProperty("zurich-library-${env}Username") ?: ""
            password = project.findProperty("zurich-library-${env}Password") ?: ""
        }
    }
}

